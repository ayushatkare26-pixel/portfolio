  <!-- Subtle teal border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#6ee7b7" stroke-width="1.5" opacity="0.35"/>
  <!-- Code-bracket monogram matching <Ayush.dev/> brand -->
